    toast("🏪 "+nm+" 상점을 만들었어요!");
    renderAdmin(); return;
  }
  if(a==="admin-tab"){ if(el.getAttribute("data-v")==="add"){ window._editMenu=null; window._menuPhoto=null; } DB.set("fl_admin_tab", el.getAttribute("data-v")); renderAdmin(); return; }
  if(a==="edit-menu"){ editMenu(el.getAttribute("data-slug"), el.getAttribute("data-id")); return; }
  if(a==="pick-photo"){ fileTarget="menu"; $("#f-file").click(); return; }
  if(a==="pick-ocr"){ fileTarget="ocr"; ensureOcrInput(); return; }
  if(a==="save-menu"){ saveMenu(el.getAttribute("data-slug")); return; }
  if(a==="del-menu"){ delMenu(el.getAttribute("data-slug"), el.getAttribute("data-id")); return; }
  if(a==="vis-cycle"){ updateMenu(el.getAttribute("data-slug"), el.getAttribute("data-id"), function(m){ m.vis=nextVis(vis(m)); }); renderAdmin(); return; }
  if(a==="toggle-price"){ updateMenu(el.getAttribute("data-slug"), el.getAttribute("data-id"), function(m){ m.hidePrice=!m.hidePrice; }); renderAdmin(); return; }
  if(a==="toggle-sold"){ updateMenu(el.getAttribute("data-slug"), el.getAttribute("data-id"), function(m){ m.soldout=!m.soldout; }); renderAdmin(); return; }
  if(a==="toggle-pause"){ updateStore(el.getAttribute("data-slug"), function(s){ s.paused=!s.paused; }); toast("영업 상태를 변경했어요"); renderAdmin(); return; }

  // collect
  if(a==="collect-run"){ runCollect(); return; }
  if(a==="collect-import"){ importDraft(); return; }

  // settings
  if(a==="set-provider"){ DB.set("fl_provider", el.getAttribute("data-v")); renderSettings(); return; }
  if(a==="open-key-sheet"){ openKeySheet(el.getAttribute("data-v")); return; }
  if(a==="key-save"){
    var _p=el.getAttribute("data-v");
    var _k=(($("#ks-key")||{}).value||"").trim();
    DB.set("fl_key_"+_p, _k);
    if(_p==="gemini"){ var _gm=$("#ks-gmodel"); if(_gm && _gm.value.trim()) DB.set("fl_gmodel", _gm.value.trim()); }
    if(_k){ DB.set("fl_provider", _p); syncKeyToPodoAI(_p, _k); toast("🔑 키 저장됨 · PodoAI에도 반영"); }
    else { toast("키를 지웠어요"); }
    var _sb=$(".sheet-bg"); if(_sb) _sb.remove();
    renderSettings(); return;
  }
  if(a==="key-del"){
    var _p2=el.getAttribute("data-v");
    DB.set("fl_key_"+_p2, "");
    toast("이 앱에 저장한 키를 지웠어요");
    var _sb2=$(".sheet-bg"); if(_sb2) _sb2.remove();
    renderSettings(); return;
  }
  if(a==="clear-key"){ DB.set("fl_key_claude",""); DB.set("fl_key_gemini",""); DB.set("fl_key",""); toast("이 앱에 저장한 키를 모두 삭제했어요 (PodoAI 키는 그대로)"); renderSettings(); return; }
  if(a==="open-claude-key"){ window.open("https://console.anthropic.com/settings/keys","_blank"); return; }
  if(a==="open-gemini-key"){ window.open("https://aistudio.google.com/apikey","_blank"); return; }
  if(a==="toggle-bill"){ window._showBill=!window._showBill; renderSettings(); return; }
});

/* (backdrop close is handled by the main click handler checking sheet-bg target;
   the previous capture-phase stopPropagation blocked all sheet buttons — removed) */

/* file upload preview */
document.addEventListener("change", function(e){
  if(e.target.id==="f-file" && e.target.files[0]){
    var r=new FileReader();
    r.onload=function(){ window._menuPhoto=r.result; var inner=$("#upInner"); if(inner) inner.innerHTML='<img src="'+r.result+'">사진 첨부됨 · 변경하려면 탭'; };
    r.readAsDataURL(e.target.files[0]);
  }
  if(e.target.id==="f-imgs" && e.target.files && e.target.files.length){
    var files=Array.prototype.slice.call(e.target.files);
    (function addNext(){
      if(!window._sellImgs) window._sellImgs=[];
      if(!files.length || window._sellImgs.length>=8){ renderImgStrip(); renderDescPrev(); e.target.value=""; return; }
      var f=files.shift();
      var rr=new FileReader();
      rr.onload=function(){ resizeImage(rr.result, 1100, function(small){ if(window._sellImgs.length<8) window._sellImgs.push(small); addNext(); }); };
      rr.readAsDataURL(f);
    })();
  }
  if(e.target.id==="f-ocr" && e.target.files[0]){
    var ro=new FileReader();
    ro.onload=function(){
      resizeImage(ro.result, 1568, function(resized){
        window._ocrPhoto=resized;
        var oi=$("#src-ocr"); if(oi) oi.value="🖼️ 사진 첨부됨 — AI 초안 만들기를 누르세요";
      });
    };
    ro.readAsDataURL(e.target.files[0]);
  }
});
function ensureOcrInput(){
  var inp=$("#f-ocr");
  if(!inp){ inp=document.createElement("input"); inp.type="file"; inp.id="f-ocr"; inp.accept="image/*"; inp.style.display="none"; document.body.appendChild(inp); }
  inp.click();
}

function editMenu(slug,id){
  var ss=stores(), m=null;
  for(var i=0;i<ss.length;i++){ if(ss[i].slug===slug){ (ss[i].menus||[]).forEach(function(x){ if(x.id===id) m=x; }); } }
  if(!m){ toast("메뉴를 찾을 수 없어요"); return; }
  window._editMenu={slug:slug, id:id};
  window._menuPhoto=m.img||null;
  DB.set("fl_admin_tab","add");
  renderAdmin();
  var set=function(idv,val){ var el=$("#"+idv); if(el) el.value=(val==null?"":val); };
  set("f-name",m.name); set("f-price",m.price); set("f-desc",m.desc); set("f-emoji",m.emoji);
  var inner=$("#upInner"); if(inner && m.img){ inner.innerHTML='<img src="'+m.img+'">사진 첨부됨 · 변경하려면 탭'; }
  var btn=document.querySelector('[data-action="save-menu"]'); if(btn) btn.textContent="✏️ 메뉴 수정 저장";
  toast("수정 모드 · 내용을 바꾼 뒤 저장하세요");
}
function saveMenu(slug){
  var name=($("#f-name").value||"").trim();
  var price=parseInt($("#f-price").value,10);
  if(!name){ toast("메뉴 이름을 입력하세요"); return; }
  if(!price||price<0){ toast("가격을 입력하세요"); return; }
  var desc=($("#f-desc").value||"").trim();
  var emoji=($("#f-emoji").value||"🍽️").trim();
  var ss=stores(); var s=null;
  for(var i=0;i<ss.length;i++){ if(ss[i].slug===slug) s=ss[i]; }
  if(!s) return;
  if(window._editMenu && window._editMenu.slug===slug){
    var eid=window._editMenu.id;
    s.menus=s.menus.map(function(x){ if(x.id!==eid) return x; x.name=name; x.price=price; x.desc=desc; x.emoji=emoji; if(window._menuPhoto) x.img=window._menuPhoto; return x; });
    saveStores(ss); window._editMenu=null; window._menuPhoto=null;
    DB.set("fl_admin_tab","list"); toast("✅ 메뉴가 수정됐어요"); renderAdmin(); return;
  }
  var id="m"+Date.now();
  var menu={id:id, name:name, price:price, desc:desc, emoji:emoji};
  if(window._menuPhoto){ menu.img=window._menuPhoto; window._menuPhoto=null; }
  s.menus.push(menu); saveStores(ss);
  window._menuPhoto=null;
  DB.set("fl_admin_tab","list");
  toast("✅ 메뉴가 등록됐어요");
  renderAdmin();
}
function delMenu(slug,id){
  var ss=stores();
  for(var i=0;i<ss.length;i++){ if(ss[i].slug===slug){ ss[i].menus=ss[i].menus.filter(function(m){return m.id!==id;}); } }
  saveStores(ss); renderAdmin(); toast("메뉴를 삭제했어요");
}
function catEmoji(cat){
  cat=(cat||"");
  if(/커피|아메|라떼|에스프/.test(cat)) return "☕";
  if(/차|티|음료|에이드/.test(cat)) return "🥤";
  if(/디저트|케이크|빵|쿠키|스콘/.test(cat)) return "🧁";
  if(/치킨/.test(cat)) return "🍗";
  if(/버거|햄버/.test(cat)) return "🍔";
  if(/면|국수|파스타/.test(cat)) return "🍜";
  if(/밥|덮밥|돈까스/.test(cat)) return "🍱";
  return "🍽️";
}
function importDraft(){
  var owner=DB.get("fl_owner");
  if(!owner){ toast("먼저 사장님 탭에서 로그인하세요"); location.hash="#/admin"; return; }
  var draft = window._draft || [];
  var inputs=document.querySelectorAll("[data-draft]");
  var ss=stores(); var s=null; for(var i=0;i<ss.length;i++){ if(ss[i].slug===owner) s=ss[i]; }
  if(!s){ toast("가게를 찾을 수 없어요"); return; }
  var added=0;
  inputs.forEach(function(inp,idx){
    var d=draft[idx]||{}; var nm=(d.name||"").trim();
    if(!nm) return;
    s.menus.push({id:"m"+Date.now()+idx, name:nm, price:parseInt(inp.value,10)||0, emoji:catEmoji(d.cat), desc:(d.desc||("AI 수집 초안 · "+(d.cat||"")))});
    added++;
  });
  saveStores(ss);
  toast("✅ "+added+"개 메뉴를 가져왔어요");
  DB.set("fl_admin_tab","list");
  location.hash="#/admin";
}

/* clipboard */
function copyText(t){
  try{ navigator.clipboard.writeText(t).then(function(){ toast("📋 링크 복사됨"); }, function(){ legacyCopy(t); }); }
  catch(e){ legacyCopy(t); }
}
function legacyCopy(t){
  var ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); toast("📋 링크 복사됨"); }catch(e){ toast("복사 실패 — 수동 복사하세요"); }
  ta.remove();
}

/* voice */
function startVoice(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast("이 브라우저는 음성인식을 지원하지 않아요"); return; }
  var rec=new SR(); rec.lang="ko-KR"; rec.interimResults=false;
  var btn=$("#micBtn"); if(btn) btn.classList.add("rec");
  rec.onresult=function(ev){ var t=ev.results[0][0].transcript; $("#aiq").value=t; runAI(t); };
  rec.onerror=function(){ toast("음성 인식 실패"); };
  rec.onend=function(){ if(btn) btn.classList.remove("rec"); };
  rec.start();
}

/* receive keys passed from PodoAI (via #keys=base64) */
function applyIncomingKeys(){
  var h=location.hash||"";
  if(h.indexOf("#keys=")!==0) return false;
  try{
    var p=JSON.parse(decodeURIComponent(escape(atob(h.slice(6)))));
    if(p.k) DB.set("fl_key_claude", p.k);
    if(p.gk) DB.set("fl_key_gemini", p.gk);
    var prov = (p.prov==="gemini" && p.gk) ? "gemini" : (p.k ? "claude" : (p.gk ? "gemini" : (p.prov||"claude")));
    DB.set("fl_provider", prov);
    if(p.gm) DB.set("fl_gmodel", p.gm);
    toast("🔑 PodoAI 키를 불러왔어요");
  }catch(e){}
  history.replaceState(null,"","#/");
  return true;
}

seed();
seedShops();
migrateReviews();

applyIncomingKeys();

router();
