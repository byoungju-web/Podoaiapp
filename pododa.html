<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pododa · 가게→메뉴→주문 공개 URL</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --paper:#FBF8FF; --ink:#1B1024; --sub:#7A6B8C;
  --grape:#6D28D9; --grape-d:#4C1D95; --grape-soft:#EFE8FB;
  --order:#FF6A3D; --order-d:#E8531F;
  --ok:#10B981; --line:#ECE3F7; --card:#FFFFFF;
  --shadow:0 12px 34px rgba(76,29,149,.10);
  --shadow-sm:0 4px 14px rgba(76,29,149,.07);
  --r:20px; --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;
  background:#EDE6F6; color:var(--ink);
  display:flex; justify-content:center;
  min-height:100vh; font-size:15px; line-height:1.5;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit}
img{display:block;max-width:100%}

/* phone frame */
#app{
  width:100%; max-width:430px; background:var(--paper);
  min-height:100vh; position:relative;
  display:flex; flex-direction:column;
  box-shadow:0 0 60px rgba(27,16,36,.18);
}

/* ===== route bar (signature) ===== */
.routebar{
  position:sticky; top:0; z-index:30;
  background:linear-gradient(135deg,#2A1244,#4C1D95);
  color:#fff; padding:11px 14px 12px;
}
.routebar .brand{display:flex;align-items:center;gap:7px;font-weight:800;font-size:13px;letter-spacing:.3px;opacity:.92;margin-bottom:8px}
.routebar .dot{width:7px;height:7px;border-radius:50%;background:var(--order);box-shadow:0 0 0 3px rgba(255,106,61,.25)}
.urlpill{
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.16);
  border-radius:12px; padding:9px 11px;
}
.urlpill .lock{font-size:12px;opacity:.7}
.urlpill .url{
  font-family:var(--mono); font-size:12px; color:#EBDDFF;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1;
  letter-spacing:-.2px;
}
.urlpill .url b{color:#fff}
.urlpill .copy{
  font-size:11px;font-weight:700;color:#fff;background:rgba(255,255,255,.16);
  padding:5px 9px;border-radius:8px;white-space:nowrap;
}
.urlpill .copy:active{background:rgba(255,255,255,.3)}

/* ===== view ===== */
#view{flex:1;padding:16px 16px 96px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.hd{margin:4px 2px 14px}
.hd h1{font-size:24px;font-weight:900;letter-spacing:-.6px;margin:0 0 4px;line-height:1.2}
.hd p{margin:0;color:var(--sub);font-size:13px}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:1.4px;color:var(--grape);text-transform:uppercase;margin-bottom:6px}

.back{display:inline-flex;align-items:center;gap:4px;color:var(--grape);font-weight:700;font-size:13px;margin-bottom:10px}

/* search */
.search{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 14px;box-shadow:var(--shadow-sm);margin-bottom:18px}
.search input{border:none;outline:none;flex:1;font-size:14px;background:transparent}
.search .ic{font-size:15px;opacity:.5}

/* example deeplinks */
.deeplinks{margin-bottom:20px}
.deeplinks .lab{font-size:11px;font-weight:800;color:var(--sub);letter-spacing:.4px;margin-bottom:8px}
.dl{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:7px;box-shadow:var(--shadow-sm)}
.dl .arrow{margin-left:auto;color:var(--grape);font-weight:800;font-size:16px}
.dl code{font-family:var(--mono);font-size:11.5px;color:var(--grape-d);letter-spacing:-.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* store grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.store{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px 14px;box-shadow:var(--shadow-sm);transition:transform .12s}
.store:active{transform:scale(.97)}
.store .emoji{font-size:30px;margin-bottom:8px}
.store .nm{font-weight:800;font-size:15px;letter-spacing:-.3px}
.store .meta{font-size:11.5px;color:var(--sub);margin-top:3px}
.store .tag{display:inline-block;font-size:10px;font-weight:800;color:var(--grape);background:var(--grape-soft);padding:3px 7px;border-radius:6px;margin-top:9px}
/* home store list: 일자형 row */
.srowlist{display:flex;flex-direction:column;gap:11px}
.srow{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 14px;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .12s}
.srow:active{transform:scale(.995)}
.srow.closed{opacity:.62}
.srow-top{display:flex;align-items:center;gap:8px}
.srow-name{flex:1;min-width:0;font-weight:800;font-size:16px;color:var(--ink);letter-spacing:-.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.srow-cat{font-size:11px;font-weight:800;color:var(--grape);background:var(--grape-soft);padding:2px 8px;border-radius:7px;margin-left:2px;white-space:nowrap}
.srow-go{color:#c9bfe0;font-size:20px;font-weight:800;flex:0 0 auto}
.srow-sub{display:flex;align-items:center;gap:9px;margin-top:7px;flex-wrap:wrap}
.srow-status{font-size:12px;font-weight:800;padding:3px 9px;border-radius:7px}
.srow-status.on{color:#0a7a53;background:rgba(16,185,129,.14)}
.srow-status.off{color:#8a8594;background:rgba(0,0,0,.06)}
.srow-rev{font-size:12.5px;font-weight:700;color:var(--sub)}
.srow-revtext{font-size:12.5px;color:#6a5f7a;margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.srow-imgs{display:flex;gap:8px;overflow-x:auto;margin-top:10px;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.srow-imgs::-webkit-scrollbar{display:none}
/* reviews */
.rv-summary{font-size:13px;font-weight:800;color:var(--grape);margin:0 2px 10px}
.rv-form{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:14px}
.rv-star-pick{display:flex;gap:4px;margin-bottom:8px}
.rv-star{font-size:27px;line-height:1;background:none;border:none;color:#f5b301;cursor:pointer;padding:2px}
.rv-star:not(.on){color:#d9d0e6}
.rv-form textarea{width:100%;box-sizing:border-box;border:1.5px solid var(--line);border-radius:10px;padding:10px;font-size:14px;font-family:inherit;min-height:64px;resize:none}
.rv-list{display:flex;flex-direction:column;gap:10px}
.rv-item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px}
.rv-stars{color:#f5b301;font-size:13px;letter-spacing:1px}
.rv-txt{font-size:13.5px;color:var(--ink);margin:5px 0 4px;line-height:1.5;word-break:break-word}
.rv-date{font-size:11px;color:var(--sub)}
.rv-empty{font-size:13px;color:var(--sub);text-align:center;padding:16px 0}
.rw-mi{flex:0 0 auto;width:72px;height:72px;border-radius:12px;background-color:var(--grape-soft);background-size:cover;background-position:center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden}

/* store hero */
.shero{background:linear-gradient(135deg,var(--grape),var(--grape-d));border-radius:var(--r);padding:20px;color:#fff;margin-bottom:18px;box-shadow:var(--shadow)}
.shero .e{font-size:40px}
.shero h2{font-size:22px;font-weight:900;margin:8px 0 2px;letter-spacing:-.5px}
.shero .sub{font-size:12.5px;opacity:.85}
.shero .chips{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.shero .chip{font-size:11px;font-weight:700;background:rgba(255,255,255,.16);padding:5px 9px;border-radius:8px}

/* menu list */
.sec-t{font-size:13px;font-weight:800;color:var(--sub);letter-spacing:.4px;margin:6px 2px 10px}
/* home: category chips + horizontal scroll + mini cards */
.cats{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.catchip{flex:0 0 auto;padding:9px 14px;border:1px solid var(--line);border-radius:20px;background:var(--card);color:var(--ink);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;box-shadow:var(--shadow-sm)}
.catchip:active{transform:scale(.96)}
.hscroll{display:flex;gap:11px;overflow-x:auto;margin-bottom:18px;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.hscroll::-webkit-scrollbar{display:none}
.mscard{flex:0 0 auto;width:132px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:9px;box-shadow:var(--shadow-sm);cursor:pointer}
.mscard:active{transform:scale(.98)}
.mc-img{width:100%;height:92px;border-radius:12px;background-color:var(--grape-soft);background-size:cover;background-position:center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center;font-size:40px;overflow:hidden;margin-bottom:8px}
.mc-name{font-size:14px;font-weight:800;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-sub{font-size:12px;color:var(--sub);font-weight:700;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.menu{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px;margin-bottom:9px;box-shadow:var(--shadow-sm);transition:transform .12s}
.menu:active{transform:scale(.985)}
.menu .ph{width:54px;height:54px;border-radius:12px;background:var(--grape-soft);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.menu .ph img{width:100%;height:100%;object-fit:cover}
.menu .info{flex:1;min-width:0}
.menu .info .nm{font-weight:800;font-size:15px;letter-spacing:-.3px}
.menu .info .ds{font-size:11.5px;color:var(--sub);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.menu .info .pr{font-weight:800;font-size:14px;color:var(--order);margin-top:5px}
.menu .go{color:var(--grape);font-weight:800;font-size:20px}

/* order screen */
.ph-big{width:100%;height:200px;border-radius:var(--r);background:var(--grape-soft);display:flex;align-items:center;justify-content:center;font-size:84px;margin-bottom:16px;overflow:hidden}
.ph-big img{width:100%;height:100%;object-fit:cover}
.o-store{font-size:12px;font-weight:800;color:var(--grape);letter-spacing:.3px}
.o-name{font-size:24px;font-weight:900;letter-spacing:-.6px;margin:3px 0}
.o-price{font-size:20px;font-weight:900;color:var(--order)}
.optblock{margin-top:20px}
.optblock .ot{font-size:13px;font-weight:800;margin-bottom:9px}
.opts{display:flex;gap:8px;flex-wrap:wrap}
.opt{border:1.5px solid var(--line);background:var(--card);border-radius:12px;padding:9px 15px;font-weight:700;font-size:13px;color:var(--sub)}
.opt.on{border-color:var(--grape);background:var(--grape-soft);color:var(--grape-d)}
.qty{display:flex;align-items:center;gap:0;border:1.5px solid var(--line);border-radius:12px;width:fit-content;overflow:hidden}
.qty button{width:42px;height:42px;font-size:20px;font-weight:800;color:var(--grape);background:var(--card)}
.qty button:active{background:var(--grape-soft)}
.qty span{width:46px;text-align:center;font-weight:800;font-size:16px}

/* url share card */
.urlcard{margin-top:22px;background:#FAF6FF;border:1.5px dashed #D9C8F0;border-radius:16px;padding:14px}
.urlcard .t{font-size:11px;font-weight:800;color:var(--grape);letter-spacing:.4px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.urlcard .u{font-family:var(--mono);font-size:11.5px;color:var(--grape-d);word-break:break-all;background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 10px}
.urlcard .acts{display:flex;gap:8px;margin-top:10px}
.urlcard .acts button{flex:1;padding:10px;border-radius:10px;font-weight:800;font-size:12.5px}
.btn-line{background:#fff;border:1.5px solid var(--grape);color:var(--grape)}
.btn-line:active{background:var(--grape-soft)}

/* sticky cta */
.cta-bar{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:12px 16px;background:linear-gradient(transparent,var(--paper) 28%);z-index:25}
.cta{width:100%;background:var(--order);color:#fff;font-weight:900;font-size:16px;padding:16px;border-radius:16px;box-shadow:0 8px 24px rgba(255,106,61,.4);display:flex;align-items:center;justify-content:center;gap:8px}
.cta:active{background:var(--order-d)}
.cta.grape{background:var(--grape);box-shadow:0 8px 24px rgba(109,40,217,.35)}
.cta.grape:active{background:var(--grape-d)}
/* 상품 하단바: 채팅 / 장바구니 반반 분할 */
.cta-bar.cta-split{display:flex;gap:10px}
.cta-bar.cta-split .cta{flex:1;width:auto;min-width:0;padding:16px 8px;font-size:15px;white-space:nowrap}
.cta.chatbtn{background:var(--grape);box-shadow:0 8px 24px rgba(109,40,217,.30)}
.cta.chatbtn:active{background:var(--grape-d)}

/* checkout sheet */
.sheet-bg{position:fixed;inset:0;background:rgba(27,16,36,.5);z-index:40;display:flex;align-items:flex-end;justify-content:center;animation:fade .2s}
.sheet{width:100%;max-width:430px;background:var(--paper);border-radius:24px 24px 0 0;padding:22px 18px calc(22px + env(safe-area-inset-bottom));animation:up .26s cubic-bezier(.2,.9,.3,1)}
.sheet h3{font-size:19px;font-weight:900;margin:0 0 4px;letter-spacing:-.4px}
.sheet .sd{font-size:12.5px;color:var(--sub);margin-bottom:16px}
.row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
.row .l{font-weight:700;font-size:14px}
.row .l small{display:block;color:var(--sub);font-weight:500;font-size:11.5px;margin-top:2px}
.row .r{font-weight:800;font-size:14px}
.total{display:flex;justify-content:space-between;align-items:center;margin:14px 0 6px}
.total .l{font-size:14px;font-weight:700}
.total .r{font-size:22px;font-weight:900;color:var(--order)}
.handoff{background:var(--grape-soft);border-radius:12px;padding:12px;font-size:12px;color:var(--grape-d);font-weight:600;margin:14px 0;display:flex;gap:8px;line-height:1.45}
.handoff .i{font-size:16px;flex-shrink:0}

/* AI order */
/* AI order */
.ai-cap{font-size:11px;font-weight:800;color:var(--grape);letter-spacing:.4px;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.ai-cap .ai-on{font-weight:700;color:var(--ok);background:rgba(16,185,129,.1);padding:3px 8px;border-radius:7px}
.ai-cap .ai-off{font-weight:700;color:var(--order);background:rgba(255,106,61,.1);padding:3px 8px;border-radius:7px}
.ai-spin{display:flex;gap:6px;padding:6px 2px 2px}
.ai-spin span{width:8px;height:8px;border-radius:50%;background:var(--grape);animation:bounce 1s infinite}
.ai-spin span:nth-child(2){animation-delay:.15s}
.ai-spin span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-5px)}}
.ai-input{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--shadow-sm);margin-bottom:14px}
.ai-input textarea{width:100%;border:none;outline:none;resize:none;font-size:15px;min-height:48px;background:transparent}
.ai-input .bar{display:flex;gap:8px;margin-top:6px}
.mic{width:46px;height:46px;border-radius:12px;background:var(--grape-soft);color:var(--grape);font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mic.rec{background:var(--order);color:#fff;animation:pulse 1s infinite}
.send{flex:1;background:var(--grape);color:#fff;font-weight:800;font-size:15px;border-radius:12px}
.send:active{background:var(--grape-d)}
.examples{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px}
.ex{font-size:12px;font-weight:700;background:var(--card);border:1px solid var(--line);color:var(--grape-d);padding:8px 12px;border-radius:20px}
.ex:active{background:var(--grape-soft)}

/* stepper */
.steps{margin-top:6px}
.step{display:flex;gap:13px;align-items:flex-start;padding-bottom:4px;opacity:.35;transition:opacity .35s}
.step.act{opacity:1}
.step .marker{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.step .bullet{width:34px;height:34px;border-radius:50%;background:var(--grape-soft);display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid transparent;transition:all .3s}
.step.act .bullet{background:var(--grape);color:#fff}
.step.done .bullet{background:var(--ok);color:#fff}
.step .line{width:2px;flex:1;background:var(--line);min-height:18px;margin:2px 0}
.step:last-child .line{display:none}
.step .body{padding-top:5px;padding-bottom:14px}
.step .st{font-weight:800;font-size:14px;letter-spacing:-.2px}
.step .sv{font-size:12.5px;color:var(--sub);margin-top:2px}
.step.act .sv{color:var(--grape-d);font-weight:600}

.result-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);margin-top:8px;animation:up .3s}
.result-card .rh{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.result-card .re{font-size:34px}
.result-card .rn{font-weight:900;font-size:17px;letter-spacing:-.3px}
.result-card .rsub{font-size:12px;color:var(--sub)}

/* ===== admin ===== */
.tabseg{display:flex;background:var(--grape-soft);border-radius:12px;padding:4px;margin-bottom:18px}
.tabseg button{flex:1;padding:9px;border-radius:9px;font-weight:800;font-size:13px;color:var(--grape)}
.tabseg button.on{background:#fff;color:var(--grape-d);box-shadow:var(--shadow-sm)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:800;margin-bottom:6px;color:var(--ink)}
.field input,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;font-size:14px;outline:none;background:var(--card)}
.field input:focus,.field textarea:focus{border-color:var(--grape)}
.selwrap{position:relative}
.selwrap select{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px 38px 12px 13px;font-size:14px;outline:none;background:var(--card);color:var(--ink);-webkit-appearance:none;appearance:none}
.selwrap select:focus{border-color:var(--grape)}
.selwrap .selarrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--grape);font-size:13px;pointer-events:none}
.field .hint{font-size:11px;color:var(--sub);margin-top:5px}
.uploader{border:1.5px dashed #D9C8F0;border-radius:14px;padding:18px;text-align:center;background:#FAF6FF;color:var(--grape);font-weight:700;font-size:13px}
.uploader img{width:84px;height:84px;border-radius:12px;object-fit:cover;margin:0 auto 8px}
.gen-url{background:var(--ink);color:#fff;border-radius:14px;padding:14px;margin-top:6px}
.gen-url .gt{font-size:11px;font-weight:800;color:#C9B6E8;letter-spacing:.5px;margin-bottom:7px}
.gen-url .gu{font-family:var(--mono);font-size:12px;color:#fff;word-break:break-all;line-height:1.6}
.gen-url .gu .hl{color:var(--order)}
#qrbox{display:flex;justify-content:center;margin-top:14px}
#qrbox img,#qrbox canvas{border-radius:10px;border:6px solid #fff;box-shadow:var(--shadow-sm)}

.mini-menu{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px;margin-bottom:8px;box-shadow:var(--shadow-sm)}
.mini-menu .me{width:42px;height:42px;border-radius:10px;background:var(--grape-soft);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0}
.mini-menu .me img{width:100%;height:100%;object-fit:cover}
.mini-menu .mi{flex:1;min-width:0}
.mini-menu .mi .mn{font-weight:800;font-size:14px}
.mini-menu .mi .mu{font-family:var(--mono);font-size:10.5px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.mini-menu .mp{font-weight:800;color:var(--order);font-size:13px}
.mini-menu .qr,.mini-menu .del{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px}
.mini-menu .qr{background:var(--grape-soft);color:var(--grape)}
.mini-menu .del{color:#C0476B}

/* menu state: soldout, badges, banner */
.menu.soldout{opacity:.55}
.menu.soldout .ph{filter:grayscale(.7)}
.badge-sold{display:inline-block;font-size:10px;font-weight:800;color:#fff;background:#C0476B;padding:2px 6px;border-radius:6px;vertical-align:middle;margin-left:4px}
.sold-banner{background:#FBE9EF;color:#C0476B;font-weight:800;font-size:13px;text-align:center;padding:11px;border-radius:12px;margin-bottom:14px}

/* admin per-menu control card */
.mcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px;margin-bottom:9px;box-shadow:var(--shadow-sm)}
.ctrls{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.ctrl{font-size:11.5px;font-weight:800;padding:7px 10px;border-radius:9px;border:1.5px solid var(--line);background:#fff;color:var(--sub)}
.ctrl:active{transform:scale(.96)}
.ctrl.vis-public{border-color:#BFE6D2;background:#EAF8F1;color:#0F8A5F}
.ctrl.vis-unlisted{border-color:#E6D9B0;background:#FBF4DE;color:#9A7A1E}
.ctrl.vis-private{border-color:#E6C3CF;background:#FBEAF0;color:#B23A63}
.ctrl.on{border-color:var(--grape);background:var(--grape-soft);color:var(--grape-d)}
.ctrl.sold{border-color:#C0476B;background:#FBE9EF;color:#C0476B}

/* store pause (휴무) */
.pausebar{display:flex;align-items:center;gap:12px;background:#EAF8F1;border:1.5px solid #BFE6D2;border-radius:16px;padding:14px;margin-bottom:16px}
.pausebar.off{background:#FBE9EF;border-color:#E6C3CF}
.pausebar .pb-info{flex:1;min-width:0}
.pausebar .pb-t{font-weight:900;font-size:15px;color:#0F8A5F}
.pausebar.off .pb-t{color:#B23A63}
.pausebar .pb-s{font-size:11.5px;color:var(--sub);margin-top:2px}
.pausebar .pb-btn{flex-shrink:0;font-weight:800;font-size:13px;padding:10px 14px;border-radius:11px;background:#0F8A5F;color:#fff}
.pausebar.off .pb-btn{background:#B23A63}
.pausebar .pb-btn:active{transform:scale(.96)}
.badge-rest{display:inline-block;font-size:10px;font-weight:800;color:#fff;background:#9A7A1E;padding:2px 6px;border-radius:6px;vertical-align:middle;margin-left:4px}
.store.closed{opacity:.6}
.store.closed .emoji{filter:grayscale(.7)}
.shero.rest{background:linear-gradient(135deg,#7A6B8C,#4A3F58)}

/* shopping: seller picker */
.sellers{display:flex;flex-direction:column;gap:7px}
.seller{display:flex;align-items:center;justify-content:space-between;border:1.5px solid var(--line);background:var(--card);border-radius:12px;padding:11px 13px;text-align:left}
.seller.on{border-color:var(--grape);background:var(--grape-soft)}
.seller .se-n{font-weight:700;font-size:13.5px}
.seller .se-low{display:inline-block;font-size:10px;font-weight:800;color:#fff;background:var(--ok);padding:2px 6px;border-radius:6px;margin-left:5px}
.seller .se-p{font-weight:800;font-size:14px;color:var(--order)}

/* home → shop entry */
.bigentry{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,#FF6A3D,#E8531F);color:#fff;border-radius:18px;padding:16px;margin-bottom:18px;box-shadow:0 8px 22px rgba(255,106,61,.32)}
.bigentry .be-e{font-size:30px}
.bigentry .be-h{font-weight:900;font-size:16px;letter-spacing:-.3px}
.bigentry .be-s{font-size:11.5px;opacity:.92;margin-top:2px}
.bigentry .be-t{flex:1;min-width:0}
.bigentry .be-go{font-size:24px;font-weight:800;opacity:.9}
.badge-mine{display:inline-block;font-size:10px;font-weight:800;color:var(--grape-d);background:var(--grape-soft);padding:2px 7px;border-radius:6px;vertical-align:middle;margin-left:4px}

/* seller: image strip (swipe, up to 8) */
.imgstrip{display:flex;gap:9px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:4px 2px 8px;scroll-snap-type:x proximity}
.imgstrip::-webkit-scrollbar{height:4px}
.imgstrip::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
.ithumb{position:relative;flex:0 0 auto;width:96px;height:96px;border-radius:12px;overflow:hidden;border:1.5px solid var(--line);scroll-snap-align:start}
.ithumb img{width:100%;height:100%;object-fit:cover}
.ithumb .ibadge{position:absolute;left:5px;bottom:5px;font-size:9px;font-weight:800;color:#fff;background:var(--grape);padding:2px 6px;border-radius:6px}
.ithumb .idel{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;background:rgba(27,16,36,.62);color:#fff;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center}
.iadd{flex:0 0 auto;width:96px;height:96px;border-radius:12px;border:1.5px dashed #D9C8F0;background:#FAF6FF;color:var(--grape);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;scroll-snap-align:start}
.iadd span{font-size:26px;line-height:1}
.iadd small{font-size:11px;font-weight:700}

/* seller: description card with representative image */
.desccard{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.desccard>img{width:100%;max-height:280px;object-fit:cover;display:block}
.desccard .dctext{padding:13px;font-size:14px;line-height:1.6;white-space:normal;word-break:break-word}
.desccard .dmeta{font-size:12px;font-weight:800;color:var(--grape);margin-bottom:8px}
.tagrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.tagchip{font-size:11px;font-weight:700;color:var(--grape-d);background:var(--grape-soft);padding:4px 9px;border-radius:8px}
.sugrow{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.sugchip{font-size:12px;font-weight:800;color:var(--grape);background:#fff;border:1.5px dashed #D9C8F0;padding:7px 11px;border-radius:18px}
.sugchip:active{background:var(--grape-soft)}

/* product gallery (swipe) */
.gallery{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--r);margin-bottom:16px;scroll-snap-type:x mandatory}
.gallery::-webkit-scrollbar{display:none}
.gslide{position:relative;flex:0 0 100%;width:100%;aspect-ratio:1/1;border-radius:var(--r);overflow:hidden;background:var(--grape-soft);scroll-snap-align:center}
.gslide img{width:100%;height:100%;object-fit:cover}
.gslide .gnum{position:absolute;right:10px;bottom:10px;font-size:12px;font-weight:800;color:#fff;background:rgba(27,16,36,.6);padding:4px 11px;border-radius:11px}
.okcard{background:#EAF8F1;border:1.5px solid #BFE6D2;color:#0F8A5F;font-weight:800;font-size:14px;border-radius:14px;padding:16px;margin-top:12px;text-align:center}
.okcard .btn-line{color:#0F8A5F;border-color:#0F8A5F}

/* shopping list: larger product image */
.menu.shopitem{padding:12px}
.menu.shopitem .ph{width:104px;height:104px;border-radius:14px;font-size:46px}
.menu.shopitem .info .nm{font-size:16px}
.menu.shopitem .info .pr{font-size:15px;margin-top:7px}
.qrwrap{margin-top:16px;text-align:center}
.qrwrap .qrt{font-size:13px;font-weight:800;color:var(--ink);margin-bottom:12px}
.qrwrap .qrt span{font-size:11px;font-weight:700;color:var(--sub);background:var(--grape-soft);padding:3px 8px;border-radius:7px;margin-left:6px}
.qrwrap #shareQr{display:flex;justify-content:center;margin-bottom:8px}
.qrwrap #shareQr img,.qrwrap #shareQr canvas{border:6px solid #fff;border-radius:10px;box-shadow:var(--shadow-sm)}

/* collect (AI auto) */
.src{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px;margin-bottom:9px;box-shadow:var(--shadow-sm)}
.src .si{width:38px;height:38px;border-radius:10px;background:var(--grape-soft);display:flex;align-items:center;justify-content:center;font-size:18px}
.src input{flex:1;border:none;outline:none;font-size:13px;background:transparent;min-width:0}
.draft-row{display:flex;align-items:center;gap:10px;padding:11px;border-bottom:1px solid var(--line)}
.draft-row .dn{flex:1;font-weight:700;font-size:13.5px}
.draft-row .dn small{display:block;color:var(--sub);font-weight:500;font-size:11px;margin-top:1px}
.draft-row .dp{display:flex;align-items:center;gap:3px}
.draft-row .dp input{width:74px;border:1.5px solid var(--line);border-radius:9px;padding:7px;font-size:13px;text-align:right;font-weight:700;outline:none}
.draft-row .dp input:focus{border-color:var(--grape)}
.draft-row .won{font-size:12px;color:var(--sub);font-weight:700}

.tip{font-size:12px;color:var(--sub);background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;line-height:1.55;margin-top:14px}
.tip b{color:var(--grape-d)}

/* bottom nav */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--line);display:flex;z-index:35;padding-bottom:env(safe-area-inset-bottom)}
.tabbar button{flex:1;padding:8px 0 7px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--sub);font-size:10px;font-weight:700}
.tabbar button .ti{font-size:23px;line-height:1}
.tabbar button.on{color:var(--grape)}

.empty{text-align:center;color:var(--sub);padding:40px 20px;font-size:13px}
.empty .ee{font-size:42px;margin-bottom:10px}

@keyframes up{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,106,61,.5)}50%{box-shadow:0 0 0 10px rgba(255,106,61,0)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.toast{position:fixed;bottom:130px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:700;z-index:60;animation:fade .2s;box-shadow:var(--shadow)}
/* 앱에서 상단 '포도AI 주문 링크' 바 + 주문 링크/QR 표시 전부 숨김 (기능 로직은 유지) */
.routebar{display:none !important}
.linkhide{display:none !important}
.urlcard{display:none !important}
.gen-url{display:none !important}

/* ===== 포도톡 (PodoTalk) — 연한 포도색 ===== */
:root{ --tk-bg:#F3EDFC; --tk-soft:#EADFFB; --tk-line:#E3D6F6; --tk-me:#DCCBF7; --tk-them:#FFFFFF; --tk-grape:#7C3AED; --tk-grape-d:#6D28D9; --tk-sub:#8B7BAE; }
body.talk-mode #view{ background:var(--tk-bg); padding-bottom:80px; }
/* 포도톡일 때만: #app을 뷰포트 고정높이로 → #view가 실제 스크롤 영역이 됨 (다른 화면 영향 없음) */
body.talk-mode{ height:100vh; height:100dvh; overflow:hidden; }
body.talk-mode #app{ height:100vh; height:100dvh; overflow:hidden; }
body.talk-mode #view{ min-height:0; }
.talkbar{ display:none; position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:#EFE7FB; border-top:1px solid var(--tk-line); z-index:36; padding-bottom:env(safe-area-inset-bottom); }
body.talk-mode .talkbar{ display:flex; }
body.talk-mode #mainTabbar{ display:none; }
.talkbar button{ flex:1; padding:8px 0 7px; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--tk-sub); font-size:10px; font-weight:800; }
.talkbar button .ti{ font-size:22px; line-height:1; }
.talkbar button.on{ color:var(--tk-grape); }
/* 포도톡 안에서는 저장/주요 버튼도 연한 포도색으로 */
body.talk-mode .cta.grape{ background:var(--tk-grape); box-shadow:0 8px 24px rgba(124,58,237,.32); }
body.talk-mode .cta.grape:active{ background:var(--tk-grape-d); }

.tk-hd{ display:flex; align-items:center; gap:10px; margin:2px 2px 16px; }
.tk-hd .tk-title{ font-size:23px; font-weight:900; letter-spacing:-.5px; color:#2A1244; }
.tk-hd .tk-badge{ margin-left:auto; font-size:11px; font-weight:800; color:var(--tk-grape); background:var(--tk-soft); padding:5px 10px; border-radius:9px; }

.tk-list{ display:flex; flex-direction:column; gap:0; background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 4px 16px rgba(76,29,149,.05); }
.tk-room{ display:flex; align-items:center; gap:12px; background:transparent; border:none; border-radius:0; padding:14px 14px; box-shadow:none; cursor:pointer; }
.tk-room:active{ background:var(--tk-soft); }
.tk-av{ width:46px; height:46px; border-radius:14px; background:var(--tk-soft); display:flex; align-items:center; justify-content:center; font-size:24px; flex:0 0 auto; }
.tk-rmid{ flex:1; min-width:0; }
.tk-rname{ font-weight:800; font-size:15px; color:#241436; letter-spacing:-.3px; display:flex; align-items:center; gap:6px; }
.tk-rname .tk-open{ font-size:10px; font-weight:800; color:#EA580C; background:#FFEDE3; padding:2px 6px; border-radius:6px; }
.tk-rlast{ font-size:12.5px; color:var(--tk-sub); margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tk-rmeta{ display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex:0 0 auto; }
.tk-rtime{ font-size:10.5px; color:#B4A6CE; white-space:nowrap; }

.tk-rhead{ position:sticky; top:0; z-index:5; display:flex; align-items:center; gap:9px; background:var(--tk-bg); padding:4px 0 12px; margin:-2px 0 6px; }
.tk-back{ font-size:24px; font-weight:800; color:var(--tk-grape); padding:0 6px 0 0; cursor:pointer; }
.tk-rhead .tk-hi{ font-weight:900; font-size:16px; color:#241436; letter-spacing:-.3px; }
.tk-rhead .tk-hs{ font-size:11.5px; color:var(--tk-sub); }
.tk-msgs{ display:flex; flex-direction:column; gap:8px; }
.tk-day{ text-align:center; font-size:11px; color:#9C8CBE; font-weight:700; margin:10px 0 4px; }
.tk-row{ display:flex; gap:7px; align-items:flex-end; }
.tk-row.me{ flex-direction:row-reverse; }
.tk-bub{ max-width:85%; padding:9px 13px; border-radius:15px; font-size:14px; line-height:1.45; word-break:break-word; }
.tk-row.them .tk-bub{ background:var(--tk-them); border:1px solid var(--tk-line); border-top-left-radius:5px; color:#241436; }
.tk-row.me .tk-bub{ background:var(--tk-me); border-top-right-radius:5px; color:#221338; }
.tk-who{ font-size:11px; font-weight:800; color:var(--tk-sub); margin:0 2px 2px; }
.tk-time{ font-size:10px; color:#B4A6CE; align-self:flex-end; white-space:nowrap; }
.tk-savatar{ width:30px; height:30px; border-radius:10px; background:var(--tk-soft); display:flex; align-items:center; justify-content:center; font-size:16px; flex:0 0 auto; }
.tk-spacer{ height:70px; }

.tk-inputbar{ position:fixed; bottom:calc(56px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); width:100%; max-width:430px; box-sizing:border-box; background:#fff; border-top:1px solid var(--tk-line); display:flex; flex-direction:column; z-index:35; }
.tk-inrow{ display:flex; align-items:center; gap:7px; padding:9px 14px; }
.tk-inrow input{ flex:1; min-width:0; border:1px solid var(--tk-line); background:var(--tk-bg); border-radius:20px; padding:10px 14px; font-size:14px; outline:none; }
.tk-send{ width:38px; height:38px; border-radius:50%; background:var(--tk-grape); color:#fff; font-size:15px; font-weight:800; flex:0 0 auto; display:flex; align-items:center; justify-content:center; }
/* 답장 스트립 */
.tk-replystrip{ display:flex; align-items:center; gap:8px; padding:8px 14px 0; }
.tk-rep-ic{ color:var(--tk-grape); font-size:15px; flex:0 0 auto; }
.tk-rep-tx{ flex:1; min-width:0; font-size:12px; color:var(--tk-sub); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tk-rep-tx b{ color:#241436; }
.tk-rep-x{ flex:0 0 auto; color:var(--tk-sub); font-size:15px; width:24px; height:24px; }
/* 빠른 답장 / 주문 바 */
.tk-quickbar{ display:flex; gap:6px; overflow-x:auto; padding:8px 12px 0; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.tk-quickbar::-webkit-scrollbar{ display:none; }
.tk-qchip{ flex:0 0 auto; background:var(--tk-soft); color:var(--tk-grape); border:1px solid var(--tk-line); border-radius:15px; padding:7px 12px; font-size:12.5px; font-weight:700; white-space:nowrap; }
.tk-qchip.order{ background:var(--tk-grape); color:#fff; border-color:var(--tk-grape); }
.tk-qchip.edit{ background:#fff; color:var(--tk-sub); font-weight:800; }
.tk-qchip:active{ transform:scale(.96); }
.tk-send:active{ transform:scale(.93); }

.tk-alarm{ display:flex; flex-direction:column; gap:8px; }
.tk-al{ display:flex; gap:11px; align-items:flex-start; background:#fff; border:1px solid var(--tk-line); border-radius:14px; padding:12px 13px; }
.tk-al .tk-ai{ font-size:20px; flex:0 0 auto; }
.tk-al .tk-at{ flex:1; min-width:0; }
.tk-al .tk-att{ font-weight:800; font-size:13.5px; color:#241436; }
.tk-al .tk-ab{ font-size:12.5px; color:var(--tk-sub); margin-top:2px; }
.tk-al .tk-atime{ font-size:10.5px; color:#B4A6CE; white-space:nowrap; flex:0 0 auto; }

.tk-set{ display:flex; flex-direction:column; gap:12px; }
.tk-field{ background:#fff; border:1px solid var(--tk-line); border-radius:14px; padding:13px; }
.tk-field label{ display:block; font-size:12px; font-weight:800; color:var(--tk-sub); margin-bottom:7px; }
.tk-field input{ width:100%; box-sizing:border-box; border:1.5px solid var(--tk-line); border-radius:10px; padding:11px; font-size:14px; outline:none; }
.tk-toggle{ display:flex; align-items:center; justify-content:space-between; background:#fff; border:1px solid var(--tk-line); border-radius:14px; padding:14px 13px; font-weight:800; font-size:14px; color:#241436; }
.tk-sw{ width:46px; height:27px; border-radius:14px; background:#D9CEEC; position:relative; transition:background .15s; flex:0 0 auto; cursor:pointer; }
.tk-sw.on{ background:var(--tk-grape); }
.tk-sw::after{ content:""; position:absolute; top:3px; left:3px; width:21px; height:21px; border-radius:50%; background:#fff; transition:transform .15s; }
.tk-sw.on::after{ transform:translateX(19px); }
.tk-empty{ text-align:center; color:var(--tk-sub); padding:44px 20px; font-size:13px; line-height:1.7; }
.tk-empty .ee{ font-size:40px; margin-bottom:10px; }

/* 아바타(사진/이모지) */
.tk-img{ display:block; width:100%; height:100%; border-radius:inherit; background-size:cover; background-position:center; }
.tk-av{ overflow:hidden; }
.tk-savatar{ overflow:hidden; }
.tk-av.tk-stack{ background:transparent; display:grid; gap:2px; padding:0; }
.tk-av.tk-stack .tk-stk{ display:flex; align-items:center; justify-content:center; background:var(--tk-soft); overflow:hidden; font-size:13px; line-height:1; }
.tk-av.tk-stack.st2{ grid-template-columns:1fr 1fr; }
.tk-av.tk-stack.st3, .tk-av.tk-stack.st4{ grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; }
.tk-av.tk-stack .tk-stk .tk-img{ width:100%; height:100%; }

/* 리스트: 잠금/멤버수 */
.tk-lock{ font-size:12px; margin-left:2px; }
.tk-cnt{ font-size:10.5px; font-weight:800; color:var(--tk-grape); background:var(--tk-soft); padding:2px 6px; border-radius:6px; margin-left:2px; }

/* 오픈채팅 상단 도구(만들기/입장) */
.tk-tools{ display:flex; gap:8px; margin:0 0 14px; }
.tk-tool{ flex:1; padding:12px 8px; border-radius:13px; font-weight:800; font-size:13px; background:#fff; color:var(--tk-grape); border:1.5px solid var(--tk-line); }
.tk-tool.primary{ background:var(--tk-grape); color:#fff; border-color:var(--tk-grape); }
.tk-tool:active{ transform:scale(.98); }

/* 방 헤더 액션(알림/설정) */
.tk-rh-mid{ flex:1; min-width:0; }
.tk-rh-mid .tk-hi{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tk-racts{ display:flex; gap:4px; flex:0 0 auto; }
.tk-ract{ width:36px; height:36px; border-radius:11px; background:#fff; border:1px solid var(--tk-line); font-size:17px; display:flex; align-items:center; justify-content:center; }
.tk-ract:active{ background:var(--tk-soft); }

/* 리뷰 검열: 욕설·비방·협박·홍보·과장(가짜 호평) 차단 */
function reviewModerate(text){
  var t=(text||"").trim(); var low=t.toLowerCase();
  if(t.length<5) return {ok:false, reason:"리뷰를 5자 이상 적어주세요"};
  if(t.length>300) return {ok:false, reason:"리뷰는 300자 이내로 적어주세요"};
  if(/https?:\/\/|www\.|\.com|\.net|\.co\.kr|\d{2,3}[-\s]?\d{3,4}[-\s]?\d{4}|카톡|카카오톡|텔레|오픈채팅|디엠|\bdm\b/i.test(low)) return {ok:false, reason:"연락처·링크·홍보는 넣을 수 없어요"};
  var bad=["씨발","시발","ㅅㅂ","좆","존나","ㅈㄴ","병신","ㅂㅅ","개새","새끼","지랄","ㅈㄹ","닥쳐","꺼져","엿먹","뒤져","미친놈","미친년","등신","느금","니미","엄창","fuck","shit","bitch","asshole"];
  for(var i=0;i<bad.length;i++){ if(t.indexOf(bad[i])>=0 || low.indexOf(bad[i])>=0) return {ok:false, reason:"욕설·비방은 등록할 수 없어요"}; }
  if(/죽여|죽어라|불질러|테러|신상\s*털|가만\s*안\s*둬|망하게|해코지/.test(t)) return {ok:false, reason:"위협·악성 표현은 등록할 수 없어요"};
  if(/(.)\1{4,}/.test(t)) return {ok:false, reason:"같은 글자·기호를 여러 번 반복하지 말아주세요"};
  var hype=(t.match(/최고|대박|짱|강추|존맛|jmt|무조건|미쳤|레전드|갓생|갓집|쩐다|킹왕짱|역대급|인생[^\s]*맛|핵꿀|개꿀/gi)||[]).length;
  var bangs=(t.match(/[!！]/g)||[]).length;
  if(hype>=4 || bangs>=5) return {ok:false, reason:"과장된 표현이 너무 많아요. 실제 경험을 담아 적어주세요"};
  if(t.length<12 && (hype>=2 || bangs>=3)) return {ok:false, reason:"조금 더 구체적으로 적어주세요"};
  return {ok:true};
}

function attachStoreSearch(){
  var q=$("#q"); if(!q) return;
  q.addEventListener("input", function(e){

    var grid = $("#storeList");

    var hits = [];

      s.menus.forEach(function(m){

        if(m.name.toLowerCase().indexOf(v)>=0 || s.name.toLowerCase().indexOf(v)>=0) hits.push({s:s,m:m});
      });

    grid.style.gridTemplateColumns="1fr";

      var closed = !storeOpen(h.s);

/* AI shopping stepper */
function playShopSteps(sh, p, intent){
  var box=$("#aiResult");
  var ci=(typeof intent.seller==="number")?intent.seller:cheapest(p);
  var se=p.sellers[ci];
  var opts=intent.opts||{}; Object.keys(p.options||{}).forEach(function(k){ if(!opts[k]) opts[k]=p.options[k][0]; });
  var optKeys=Object.keys(p.options||{});
  var steps=[
    {ic:"🧠", t:"요청 의도 분석", v:sh.name+" · "+p.name},
    {ic:sh.emoji, t:sh.name+" 실행", v:"공개 URL "+HOST+"/p/"+sh.name+"/"+p.name+" 진입"},
    {ic:"🔎", t:p.name+" 검색", v:"상품 페이지 도달"},
    {ic:"💰", t:"가장 저렴한 판매자 선택", v:se.name+" "+won(se.price)+" (최저가)"}
  ];
  optKeys.forEach(function(k){
    steps.push({ic:(k.indexOf("색")>=0?"🎨":(k.indexOf("저장")>=0||k.indexOf("용량")>=0?"💾":"⚙️")), t:k+" 선택", v:opts[k]});
  });
  steps.push({ic:"📦", t:"장바구니 담기", v:"수량 "+ (intent.qty||1) +"개 추가"});
  steps.push({ic:"✅", t:"결제 직전 도달", v:"최종 확인만 남았습니다"});

  box.innerHTML='<div class="steps">'+steps.map(function(st,i){
    return '<div class="step" data-i="'+i+'"><div class="marker"><div class="bullet">'+st.ic+'</div><div class="line"></div></div>'+
      '<div class="body"><div class="st">'+st.t+'</div><div class="sv">'+st.v+'</div></div></div>';
  }).join("")+'</div><div id="aiFinal"></div>';

  var nodes=box.querySelectorAll(".step"); var i=0;
  (function next(){
    if(i>=nodes.length){
      var c=cartShop();
      c.push({kind:"shop", store:sh.name, name:p.name, price:se.price, qty:(intent.qty||1), pay:(p.pay||null), sub:[se.name].concat(optKeys.map(function(k){return opts[k];})).join(" · ")});
      saveCartShop(c);
      $("#aiFinal").innerHTML=
        '<div class="result-card"><div class="rh"><div class="re">'+p.emoji+'</div>'+
        '<div><div class="rn">'+p.name+' 담기 완료</div><div class="rsub">'+sh.name+' · '+se.name+
        (optKeys.length?' · '+optKeys.map(function(k){return opts[k];}).join(" · "):'')+'</div></div>'+
        '<div style="margin-left:auto;font-weight:900;color:var(--order);font-size:17px">'+won(se.price)+'</div></div>'+
        '<button class="cta" data-action="open-checkout" data-kind="shop">결제 직전 화면 열기 ›</button>'+
        '<div class="handoff" style="margin-bottom:0;margin-top:10px"><span class="i">🤝</span><div><b>외부 앱 핸드오프</b><br>실제 쿠팡·11번가 앱은 장바구니 추가 API를 공개하지 않아, 배포 시엔 여기서 딥링크로 앱을 열고 마지막 담기·결제는 사용자가 확인합니다.</div></div></div>';
      $("#aiFinal").scrollIntoView({behavior:"smooth",block:"center"});
      return;
    }
    if(i>0){ nodes[i-1].classList.remove("act"); nodes[i-1].classList.add("done"); }
    nodes[i].classList.add("act"); i++;
    setTimeout(next, 560);
  })();
}

var STOPWORDS = ["저렴","저렴한","저렴한곳","제일","가장","최저가","최저","싼","싼곳","싸게","알려줘","알려","추천","추천해줘","보여줘","보여","찾아줘","찾아","검색","주문","주문해줘","담아줘","담아","사줘","구매","구입","해줘","쇼핑몰","쇼핑","에서","어디","어디서","하나","한개","좀","으로","그리고"];
function tokenize(t){
  return (t||"").toLowerCase().replace(/[^가-힣a-z0-9 ]/g," ").split(/\s+/).filter(function(w){
    return w.length>=2 && STOPWORDS.indexOf(w)<0;
  });
}
function scoreProduct(t, toks, sh, p){
  var pn=p.name.toLowerCase(), pnns=pn.replace(/\s/g,"");
  var score=0;
  if(t.indexOf(pn)>=0 || t.indexOf(pnns)>=0) score+=6;
  toks.forEach(function(w){ if(pn.indexOf(w)>=0 || pnns.indexOf(w)>=0) score+=2; });
  pn.split(/\s+/).forEach(function(w){ if(w.length>=2 && t.indexOf(w)>=0) score+=2; });
  (p.tags||[]).forEach(function(tag){
    tag=(""+tag).toLowerCase(); if(!tag) return;
    if(t.indexOf(tag)>=0) score+=4;
    toks.forEach(function(w){ if(tag.indexOf(w)>=0 || w.indexOf(tag)>=0) score+=3; });
  });
  if(p.cat && toks.some(function(w){ return p.cat.toLowerCase().indexOf(w)>=0; })) score+=1;
  if(t.indexOf(sh.name.toLowerCase())>=0) score+=1;
  return score;
}
function shopCandidates(text){
  var t=(text||"").toLowerCase(), toks=tokenize(t), arr=[];
  shops().forEach(function(sh){
    sh.products.forEach(function(p){
      var s=scoreProduct(t, toks, sh, p);
      if(s>=2) arr.push({shop:sh, product:p, score:s});
    });
  });
  arr.sort(function(a,b){ return b.score-a.score; });
  return arr.slice(0,6);
}
function shopIntentFor(p, text){
  var t=(text||"").toLowerCase(), opts={};
  Object.keys(p.options||{}).forEach(function(k){
    p.options[k].forEach(function(o){ if(t.indexOf(o.toLowerCase())>=0) opts[k]=o; });
  });
  return {opts:opts, seller:cheapest(p), qty:1};
}
function parseShopIntent(text){
  var c=shopCandidates(text);
  if(!c.length) return null;
  var best=c[0]; var hit={shop:best.shop, product:best.product};
  var i=shopIntentFor(best.product, text);
  hit.opts=i.opts; hit.seller=i.seller; hit.qty=i.qty;
  return hit;
}

function saveProduct(){

  var price=parseInt($("#s-price").value,10);
  if(!name){ toast("상품명을 입력하세요"); return; }
  if(!price||price<0){ toast("가격을 입력하세요"); return; }
  var desc=($("#s-desc").value||"").trim();
  var cat=($("#s-cat").value||"").trim();
  var tags=(($("#s-tags")&&$("#s-tags").value)||"").split(/[,\n]/).map(function(x){return x.trim();}).filter(Boolean);

  var sHolder=(($("#s-holder")||{}).value||"").trim();

    for(var qE=0;qE<ssE.length;qE++){ if(ssE[qE].slug==="myshop"){ ssE[qE].products=(ssE[qE].products||[]).map(function(x){
      if(x.id!==window._editProdId) return x;
      x.name=name; x.price=price; x.desc=desc; x.cat=cat; x.tags=tags;
      x.condition=window._sellCond||x.condition; x.delivery=window._sellDeliv||x.delivery;

      if(sAcct){ x.pay={bank:sBank,acct:sAcct,holder:sHolder}; } else { delete x.pay; }
      return x;
    }); } }
    saveShops(ssE); window._editProdId=null; afterSaveReset();
    DB.set("fl_sell_tab","list"); renderSell(); toast("✅ 상품이 수정됐어요"); return;
  }
  var prod={ id:"sp"+Date.now(), ts:Date.now(), name:name, price:price, emoji:"🏷️", desc:desc, cat:cat, tags:tags,
    condition:window._sellCond||"중고", delivery:window._sellDeliv||"택배(배송비 포함)", images:imgs, sellers:[{name:"내 상점", price:price}] };
  if(sAcct){ prod.pay={bank:sBank,acct:sAcct,holder:sHolder}; }
  var ss=shops(); for(var i=0;i<ss.length;i++){ if(ss[i].slug==="myshop") ss[i].products.unshift(prod); } saveShops(ss);
  $("#genResultS").innerHTML =
    '<div class="okcard">✅ 상품이 등록되었습니다'+
      '<button class="btn-line" data-action="sell-tab" data-v="list" style="margin-top:10px;width:100%;padding:11px;border-radius:11px;font-weight:800;font-size:13px">내 상품 보기</button></div>';
  afterSaveReset();
  toast("상품이 등록됐어요");
  $("#genResultS").scrollIntoView({behavior:"smooth",block:"center"});
}
function delProduct(id){
  var ss=shops();
  for(var i=0;i<ss.length;i++){ if(ss[i].slug==="myshop"){ ss[i].products=ss[i].products.filter(function(p){return p.id!==id;}); } }

var TAG_SYN=[
  ["리모콘","리모컨","리모트컨트롤","리모트"],
  ["휴대폰","핸드폰","폰","스마트폰","휴대전화"],
  ["노트북","랩탑","laptop","노트북컴퓨터"],

  ["청소기","진공청소기","무선청소기","스틱청소기"],
  ["텀블러","보온병","물통","보냉병"],
  ["셋톱박스","셋톱","셋탑","set top","셋탑박스"],
  ["티비","tv","텔레비전","티브이"],
  ["충전기","charger","고속충전기","어댑터","충전케이블"],
  ["마우스","mouse","무선마우스"],
  ["키보드","keyboard","기계식키보드"],
  ["에어팟","airpods","에어팟프로"],
  ["아이폰","iphone","아이폰프로"],
  ["갤럭시","galaxy","갤s"],
  ["애플워치","apple watch","워치","스마트워치"],
  ["스위치","switch","닌텐도스위치","닌텐도"],
  ["모니터","monitor","디스플레이"],
  ["선풍기","써큘레이터","circulator"]
];
function localTagSuggest(name, cat){
  var n=(name||"").toLowerCase(), out=[];
  TAG_SYN.forEach(function(grp){
    if(grp.some(function(w){ return n.indexOf(w.toLowerCase())>=0; })){
      grp.forEach(function(w){ if(n.indexOf(w.toLowerCase())<0) out.push(w); });
    }
  });
  var ns=(name||"").replace(/\s/g,""); if(ns && ns.toLowerCase()!==n) out.push(ns);
  (name||"").split(/\s+/).forEach(function(w){ if(w.length>=2) out.push(w); });
  (cat||"").split(/[\/\s]+/).forEach(function(w){ if(w.length>=2) out.push(w); });
  var seen={}, res=[];
  out.forEach(function(w){ w=(""+w).trim(); var k=w.toLowerCase(); if(w && !seen[k] && k!==n){ seen[k]=1; res.push(w); } });
  return res.slice(0,10);
}
function suggestTags(){
  var name=($("#s-name")&&$("#s-name").value||"").trim();
  var cat=($("#s-cat")&&$("#s-cat").value||"").trim();
  if(!name){ toast("상품명을 먼저 입력하세요"); return; }
  var box=$("#tagSug"); if(box) box.innerHTML='<div class="hint">추천 생성 중…</div>';
  if(!getKey()){ return renderTagSug(localTagSuggest(name, cat)); }
  var sys="너는 한국 쇼핑 검색 태그 생성기다. 상품명과 카테고리를 보고 사람들이 검색할 때 실제로 입력하는 별칭·동의어·자주 틀리는 표기·영문/한글 변형·줄임말을 만들어라. JSON 배열만 출력(설명 금지): [\"태그1\",\"태그2\"]. 최대 10개, 각 태그는 짧게. 상품명과 동일한 것은 제외.";
  var usr="상품명: "+name+"\n카테고리: "+(cat||"(없음)");
  aiComplete({system:sys, blocks:[{type:"text", text:usr}], max_tokens:300, temperature:0.4, json:true, prefill:"["})
    .then(function(txt){
      var arr=parseJSONLoose(txt);
      if(!Array.isArray(arr)||!arr.length){ return renderTagSug(localTagSuggest(name, cat)); }
      renderTagSug(arr.map(function(x){return (""+x).trim();}).filter(Boolean).slice(0,10));
    })
    .catch(function(){ renderTagSug(localTagSuggest(name, cat)); });
}
function renderTagSug(list){
  window._tagSug=list||[];
  var box=$("#tagSug"); if(!box) return;
  var cur=(($("#s-tags")&&$("#s-tags").value)||"").toLowerCase();
  var chips=(list||[]).filter(function(x){ return x && cur.indexOf((""+x).toLowerCase())<0; });
  if(!chips.length){ box.innerHTML='<div class="hint">추가할 새 추천이 없어요</div>'; return; }
  box.innerHTML='<div class="sugrow">'+chips.map(function(x){
    return '<button class="sugchip" data-action="add-tag" data-tag="'+(""+x).replace(/"/g,'')+'">+ '+x+'</button>';
  }).join("")+'</div>';
}

function openCheckout(kind){

/* very light intent parsing (demo) */
function parseIntent(text){
  text = (text||"").toLowerCase();
  var ss = stores();
  var hit=null;
  ss.forEach(function(s){
    var keys=[s.name.toLowerCase(), s.slug.toLowerCase()];
    if(s.name.indexOf("스타벅스")>=0) keys.push("스벅");
    keys.forEach(function(k){ if(k && text.indexOf(k)>=0) hit=hit||{store:s}; });
    s.menus.forEach(function(m){
      var mn=m.name.toLowerCase();
      if(text.indexOf(mn)>=0 || (mn.indexOf("아메리카노")>=0 && (text.indexOf("아아")>=0||text.indexOf("아메리카노")>=0))){
        hit = {store:s, menu:m};
      }
    });
  });
  // detect size/temp
  var size=null,temp=null;
  if(text.indexOf("아이스")>=0||text.indexOf("아아")>=0||text.indexOf("ice")>=0) temp="ICED";
  if(text.indexOf("핫")>=0||text.indexOf("따뜻")>=0||text.indexOf("hot")>=0) temp="HOT";
  if(text.indexOf("톨")>=0||text.indexOf("tall")>=0) size="Tall";
  if(text.indexOf("그란데")>=0||text.indexOf("grande")>=0) size="Grande";
  if(text.indexOf("벤티")>=0||text.indexOf("venti")>=0) size="Venti";
  if(text.indexOf("세트")>=0) size="세트";
  if(hit && hit.menu){
    hit.temp = temp || hit.menu.defTemp || null;
    hit.size = size || hit.menu.defSize || (hit.menu.sizes?hit.menu.sizes[0]:null);
  }
  return hit;
}

/* ── PodoAI(같은 도메인)에 저장된 키를 함께 사용 ── */
function podoaiLocked(){ try{ return !!localStorage.getItem("podoai_vault"); }catch(e){ return false; } }
function podoaiKey(prov){
  try{
    if(podoaiLocked()) return "";                         /* PodoAI가 PIN 잠김 → 못 읽음 */
    var raw=localStorage.getItem(prov==="gemini"?"podoai_gk":"podoai_k");
    if(!raw) return "";
    var v=JSON.parse(raw);                                /* PodoAI는 JSON.stringify로 저장 */
    return (typeof v==="string")?v:"";
  }catch(e){ return ""; }
}
function ownKey(prov){ return DB.get("fl_key_"+prov) || (prov==="claude"?(DB.get("fl_key")||""):""); }
function keyFor(prov){ return ownKey(prov) || podoaiKey(prov); }
function keySource(prov){ return ownKey(prov) ? "own" : (podoaiKey(prov) ? "podoai" : ""); }
/* PodoAI가 쓰는 모델 선택도 따라감 (pododa에서 직접 고르면 그게 우선) */
function getProvider(){
  var p=DB.get("fl_provider")||"";
  if(p && keyFor(p)) return p;
  if(!p){
    try{ var pm=JSON.parse(localStorage.getItem("podoai_model")||"null"); if(pm==="gemini"&&keyFor("gemini")) return "gemini"; }catch(e){}
  }
  if(keyFor("claude")) return "claude";
  if(keyFor("gemini")) return "gemini";
  return p||"claude";
}
function getKey(){ return keyFor(getProvider()); }
function aiModelLabel(){
  return getProvider()==="gemini" ? ("Gemini · "+(DB.get("fl_gmodel")||"gemini-flash-latest")) : "Claude · claude-sonnet-4-6";
}
function aiComplete(opts){
  opts = opts||{};
  return (getProvider()==="gemini") ? callGemini(opts) : callClaudeN(opts);
}
/* blocks: [{type:'text',text} | {type:'image',mime,data}] */
function callClaudeN(opts){
  var content = (opts.blocks||[]).map(function(b){
    if(b.type==="image") return {type:"image", source:{type:"base64", media_type:b.mime, data:b.data}};
    return {type:"text", text:b.text};
  });
  var messages=[{role:"user", content:content}];
  /* claude-sonnet-4-6은 assistant prefill 미지원 → 보내지 않고 parseJSONLoose로 처리 */
  var body={ model:"claude-sonnet-4-6", max_tokens:opts.max_tokens||1024, messages:messages };
  if(opts.system) body.system=opts.system;
  if(typeof opts.temperature==="number") body.temperature=opts.temperature;
  return fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "content-type":"application/json",
      "x-api-key":getKey(),
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify(body)
  }).then(function(r){return r.json();}).then(function(d){
    if(d.error) throw new Error((d.error&&d.error.message)||"Claude 오류");
    var txt=(d.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n");
    return txt;
  });
}
function callGemini(opts){
  var parts=(opts.blocks||[]).map(function(b){
    if(b.type==="image") return {inline_data:{mime_type:b.mime, data:b.data}};
    return {text:b.text};
  });
  var gen={};
  if(typeof opts.temperature==="number") gen.temperature=opts.temperature;
  if(opts.max_tokens) gen.maxOutputTokens=opts.max_tokens;
  if(opts.json) gen.responseMimeType="application/json";
  var body={ contents:[{role:"user", parts:parts}], generationConfig:gen };
  if(opts.system) body.systemInstruction={parts:[{text:opts.system}]};
  var model=DB.get("fl_gmodel")||"gemini-flash-latest";
  return fetch("https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent",{
    method:"POST",
    headers:{ "content-type":"application/json", "x-goog-api-key":getKey() },
    body:JSON.stringify(body)
  }).then(function(r){return r.json();}).then(function(d){
    if(d.error) throw new Error((d.error&&d.error.message)||"Gemini 오류");
    var c=d.candidates&&d.candidates[0];
    if(!c){ throw new Error("Gemini 응답이 비었습니다 (안전필터 또는 모델명 확인)"); }
    return ((c.content&&c.content.parts)||[]).map(function(p){return p.text||"";}).join("\n");
  });
}
function parseJSONLoose(txt){
  if(!txt) return null;
  var t = txt.replace(/```json/gi,"").replace(/```/g,"").trim();
  var s=t.indexOf("{"); if(s<0) s=t.indexOf("[");
  var e=Math.max(t.lastIndexOf("}"), t.lastIndexOf("]"));
  if(s>=0&&e>=0) t=t.slice(s,e+1);
  try{ return JSON.parse(t); }catch(err){ return null; }
}

function flTzCountry(){

    var alias={"Asia/Calcutta":"IN","Asia/Katmandu":"NP","Asia/Saigon":"VN","Asia/Rangoon":"MM",

    if(alias[tz]) return alias[tz];
  }catch(e){}
  return "";
}
function flDetectCountry(){
  var c=flTzCountry(); if(c&&FL_WORLD[c]) return c;
  var tag=String(navigator.language||navigator.userLanguage||"ko-KR");
  var parts=tag.split("-");
  var region=(parts[1]||"").toUpperCase();
  if(FL_WORLD[region]) return region;
  var lang=(parts[0]||"ko").toLowerCase();
  for(var k in FL_WORLD){ if(FL_WORLD[k][2]===lang) return k; }
  return "KR";
}

function flCache(l){ try{ return JSON.parse(DB.get("pododa_i18n_"+l)||"{}"); }catch(e){ return {}; } }
function flCacheSave(l,m){ try{ DB.set("pododa_i18n_"+l, JSON.stringify(m)); }catch(e){} }

/* ---------- 스캔 ---------- */
var FL_NODES=[], FL_PH=[], FL_OBS=null, FL_TICK=null;
var FL_Q=[], FL_QSET={}, FL_WORKING=false, FL_TRIES={};
var FL_SKIP='[data-no-i18n],.toast,#aiResult,[id*="result"],[id*="Result"],[id*="-out"]';
function flVisible(el){ try{ return el&&el.getClientRects&&el.getClientRects().length>0; }catch(e){ return true; } }
function flScan(root){
  if(!root) return;
  try{
    var w=document.createTreeWalker(root, NodeFilter.SHOW_TEXT, { acceptNode:function(n){
      var p=n.parentNode; if(!p) return 2;
      var tag=p.nodeName; if(tag==="SCRIPT"||tag==="STYLE"||tag==="TEXTAREA"||tag==="OPTION") return 2;
      if(n.__fl) return 2;
      var v=n.nodeValue; if(!v||!/[가-힣]/.test(v)) return 2;
      if(p.closest&&p.closest(FL_SKIP)) return 2;
      if(!flVisible(p)) return 2;
      return 1;
    }});
    var n; while(n=w.nextNode()){ n.__fl=1; FL_NODES.push({n:n, ko:n.nodeValue}); }
  }catch(e){}
  try{
    var qs=root.querySelectorAll?root.querySelectorAll("[placeholder]"):[];
    for(var i=0;i<qs.length;i++){ var el=qs[i];
      if(el.__flph) continue;
      if(el.closest&&el.closest(FL_SKIP)) continue;
      if(!flVisible(el)) continue;
      var ph=el.getAttribute("placeholder")||"";
      if(/[가-힣]/.test(ph)){ el.__flph=1; el.setAttribute("data-fl-ko",ph); FL_PH.push(el); }
    }
  }catch(e){}
}
function flApplyCache(){
  var lang=flCurLang(); if(lang==="ko") return;
  var c=flCache(lang);
  FL_NODES.forEach(function(o){
    if(!o.n.isConnected) return;
    var k=o.ko.trim(); var tr=c[k];
    o.n.nodeValue = tr ? o.ko.replace(k,tr) : o.ko;
  });
  FL_PH.forEach(function(el){
    if(!el.isConnected) return;
    var ko=el.getAttribute("data-fl-ko"); if(ko==null) return;
    var tr=c[ko.trim()];
    el.setAttribute("placeholder", tr||ko);
  });
}

/* ---------- 번역 큐 (재시도 상한 4회) ---------- */
function flEnqueue(list){
  for(var i=0;i<list.length;i++){ var k=list[i]; if(!k) continue;
    if((FL_TRIES[k]||0)>=4) continue;
    if(!FL_QSET[k]){ FL_QSET[k]=1; FL_Q.push(k); } }
  if(!FL_WORKING) flWork();
}
function flWork(){
  if(FL_WORKING||!FL_Q.length) return;
  if(flCurLang()==="ko"){ FL_Q=[]; FL_QSET={}; return; }
  FL_WORKING=true; flWorkStep();
}
function flWorkStep(){
  if(!FL_Q.length){ FL_WORKING=false; return; }
  var lang=flCurLang();
  if(lang==="ko"){ FL_Q=[]; FL_QSET={}; FL_WORKING=false; return; }
  var batch=[], chars=0;
  while(FL_Q.length && batch.length<40 && chars<1400){
    var k=FL_Q.shift(); delete FL_QSET[k];
    FL_TRIES[k]=(FL_TRIES[k]||0)+1;
    batch.push(k); chars+=(k.length+1);
  }
  flTranslateBatch(batch, lang, function(map){
    try{
      var c=flCache(lang), got=0;
      for(var k in map){ if(map[k]!=null && map[k]!==""){ c[k]=map[k]; got++; } }
      if(got) flCacheSave(lang,c);
      flApplyCache();
    }catch(e){}
    setTimeout(flWorkStep, 80);
  });
}
function flTranslateBatch(batch, lang, done){
  if(!batch||!batch.length){ done({}); return; }
  flTrGoogle(batch, lang, function(map){ done(map); }, function(){
    flTrMyMemory(batch, lang, function(map){
      var miss=batch.filter(function(k){ return map[k]==null; });
      if(miss.length && getKey()){ flTrAI(miss, lang, function(m2){ for(var k in m2) map[k]=m2[k]; done(map); }); }
      else done(map);
    });
  });
}
function flTrGoogle(batch, lang, ok, fail){
  try{
    var joined=batch.join("\n");
    var url="https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl="+flLangCode(lang)+"&dt=t&q="+encodeURIComponent(joined);
    var to=setTimeout(function(){ to=null; fail(); }, 8000);
    fetch(url).then(function(r){ if(!r.ok) throw 0; return r.json(); }).then(function(d){
      if(to===null) return; clearTimeout(to);
      var seg=d&&d[0]; if(!seg||!seg.length){ fail(); return; }
      var full=""; for(var i=0;i<seg.length;i++){ full+=(seg[i][0]||""); }
      var lines=full.split("\n");
      if(lines.length!==batch.length){ fail(); return; }
      var map={}; for(var j=0;j<batch.length;j++){ map[batch[j]]=(lines[j]||"").trim(); }
      ok(map);
    }).catch(function(){ if(to===null) return; clearTimeout(to); fail(); });
  }catch(e){ fail(); }
}
function flTrMyMemory(batch, lang, done){
  var lp="ko|"+flLangCode(lang);
  var map={}, idx=0, active=0, max=5, finished=false;
  function check(){ if(idx>=batch.length && active===0 && !finished){ finished=true; done(map); } }
  function next(){
    while(active<max && idx<batch.length){
      (function(k){
        active++;
        var url="https://api.mymemory.translated.net/get?q="+encodeURIComponent(k)+"&langpair="+encodeURIComponent(lp);
        var to=setTimeout(function(){ to=null; active--; next(); check(); }, 8000);
        fetch(url).then(function(r){ return r.json(); }).then(function(d){
          if(to===null) return; clearTimeout(to);
          var t=d&&d.responseData&&d.responseData.translatedText;
          if(t && !/MYMEMORY WARNING|INVALID|NO QUERY/i.test(t)) map[k]=t;
          active--; next(); check();
        }).catch(function(){ if(to===null) return; clearTimeout(to); active--; next(); check(); });
      })(batch[idx]); idx++;
    }
    check();
  }
  if(!batch.length){ done(map); return; }
  next();
}
function flTrAI(batch, lang, done){
  if(!getKey()){ done({}); return; }
  var sys="You are a UI localization engine. Translate each Korean string in the given JSON array into "+flLangEng(lang)+". Keep brand/app/proper names unchanged (Pododa, PodoTalk, Toss, KakaoPay, NaverPay, Claude, Gemini). Keep emojis, numbers and symbols. Natural short UI wording. Return ONLY a JSON object mapping each original Korean string to its translation. No markdown.";
  try{
    aiComplete({ system:sys, blocks:[{type:"text", text:JSON.stringify(batch)}], max_tokens:3000, json:true, temperature:0 })
      .then(function(txt){ done(parseJSONLoose(txt)||{}); })
      .catch(function(){ done({}); });
  }catch(e){ done({}); }
}

/* ---------- 렌더 / 스캔 트리거 ---------- */
function flRender(){
  FL_NODES=FL_NODES.filter(function(o){ return o.n && o.n.isConnected; });
  FL_PH=FL_PH.filter(function(el){ return el && el.isConnected; });
  var lang=flCurLang();
  if(lang==="ko"){
    FL_NODES.forEach(function(o){ try{ o.n.nodeValue=o.ko; }catch(e){} });
    FL_PH.forEach(function(el){ var ko=el.getAttribute("data-fl-ko"); if(ko!=null) el.setAttribute("placeholder",ko); });
    return;
  }
  flApplyCache();
  var cache=flCache(lang), need=[];
  FL_NODES.forEach(function(o){ var k=o.ko.trim(); if(k && cache[k]==null) need.push(k); });
  FL_PH.forEach(function(el){ var k=(el.getAttribute("data-fl-ko")||"").trim(); if(k && cache[k]==null) need.push(k); });
  if(need.length) flEnqueue(need);
}
/* 숨어 있는 시트·탭바 문구까지 미리 번역해 두기 */
function flPrewarm(){
  try{
    var lang=flCurLang(); if(lang==="ko") return;
    var cache=flCache(lang), need=[], seen={};
    var w=document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, { acceptNode:function(n){
      var p=n.parentNode; if(!p) return 2;
      var tag=p.nodeName; if(tag==="SCRIPT"||tag==="STYLE"||tag==="TEXTAREA"||tag==="OPTION") return 2;
      var v=n.nodeValue; if(!v||!/[가-힣]/.test(v)) return 2;
      if(p.closest&&p.closest(FL_SKIP)) return 2;
      return 1;
    }});
    var n; while(n=w.nextNode()){ var k=n.nodeValue.trim(); if(k && cache[k]==null && !seen[k]){ seen[k]=1; need.push(k); } }
    var qs=document.querySelectorAll("[placeholder]");
    for(var i=0;i<qs.length;i++){ var el=qs[i]; if(el.closest&&el.closest(FL_SKIP)) continue;
      var ph=el.getAttribute("placeholder")||"";
      if(/[가-힣]/.test(ph)){ var k2=ph.trim(); if(k2 && cache[k2]==null && !seen[k2]){ seen[k2]=1; need.push(k2); } } }
    if(need.length) flEnqueue(need);
  }catch(e){}
}
function flI18nRun(){ try{ flScan(document.body); flRender(); }catch(e){} }
function flTick(){ if(FL_TICK) clearTimeout(FL_TICK); FL_TICK=setTimeout(flI18nRun, 120); }
function flSchedule(){ if(flCurLang()==="ko") return; flTick(); }
function flSetupObserver(){
  if(FL_OBS||typeof MutationObserver==="undefined") return;
  try{
    FL_OBS=new MutationObserver(function(muts){
      if(flCurLang()==="ko") return;
      for(var i=0;i<muts.length;i++){
        var mu=muts[i];
        if(mu.type==="attributes"){ flTick(); return; }
        if(mu.type==="childList" && mu.addedNodes && mu.addedNodes.length){
          /* 토스트만 추가된 건 무시 (루프 방지) */
          var real=false;
          for(var j=0;j<mu.addedNodes.length;j++){
            var nd=mu.addedNodes[j];
            if(nd.nodeType===1 && nd.classList && nd.classList.contains("toast")) continue;
            real=true; break;
          }
          if(real){ flTick(); return; }
        }
      }
    });
    FL_OBS.observe(document.body,{subtree:true, childList:true, attributes:true, attributeFilter:["style"]});
  }catch(e){}
  try{
    var _st=null;
    document.addEventListener("scroll", function(){ if(flCurLang()==="ko") return; if(_st) clearTimeout(_st); _st=setTimeout(flTick,250); }, true);
  }catch(e){}
}
function flStart(){
  flI18nRun();
  if(flCurLang()!=="ko") setTimeout(flPrewarm, 150);
  flSetupObserver();
}

/* downscale image to improve OCR reliability & cut tokens (long edge ~1568px) */
function resizeImage(dataUrl, maxDim, cb){
  try{
    var img=new Image();
    img.onload=function(){
      var w=img.width||1, h=img.height||1, scale=Math.min(1, maxDim/Math.max(w,h));
      var cw=Math.max(1,Math.round(w*scale)), ch=Math.max(1,Math.round(h*scale));
      var cv=document.createElement("canvas"); cv.width=cw; cv.height=ch;
      var ctx=cv.getContext("2d");
      ctx.fillStyle="#fff"; ctx.fillRect(0,0,cw,ch);
      ctx.drawImage(img,0,0,cw,ch);
      try{ cb(cv.toDataURL("image/jpeg",0.92), cw, ch); }
      catch(e){ cb(dataUrl); }
    };
    img.onerror=function(){ cb(dataUrl); };
    img.src=dataUrl;
  }catch(e){ cb(dataUrl); }
}
/* coerce a Korean menu price string to integer won */
function normPrice(v){
  if(typeof v==="number") return Math.round(v);
  var s=(""+(v||"")).trim();
  if(!s) return 0;
  // "1만2천", "1만2천5백"
  var man=s.match(/(\d+)\s*만/), cheon=s.match(/(\d+)\s*천/), baek=s.match(/(\d+)\s*백/);
  if(man||cheon||baek){
    return (man?parseInt(man[1],10)*10000:0)+(cheon?parseInt(cheon[1],10)*1000:0)+(baek?parseInt(baek[1],10)*100:0);
  }
  // "4.5" or "4,5" abbreviation → 4500
  var ab=s.match(/^(\d{1,2})[.,](\d)\s*$/);
  if(ab) return parseInt(ab[1],10)*1000 + parseInt(ab[2],10)*100;
  var n=parseInt(s.replace(/[^0-9]/g,""),10)||0;
  // bare small number likely in 천원 units (e.g. "12" → 12000)
  if(n>0 && n<100 && !/[,]/.test(s)) return n*1000;
  return n;
}

/* play the agent stepper for a resolved intent */
function playOrderSteps(s, m, intent){
  var box=$("#aiResult");
  if(!storeOpen(s)){
    box.innerHTML='<div class="result-card"><div class="rh"><div class="re">😴</div>'+
      '<div><div class="rn">'+s.name+' 휴무 중</div><div class="rsub">지금은 주문을 받지 않아요</div></div></div>'+
      '<p style="color:var(--sub);font-size:13px;margin:0">다른 가게로 주문해보세요.</p></div>';
    return;
  }
  if(!isAccessible(m)){ aiFail(box, m.name+"은(는) 비공개로 설정된 메뉴예요"); return; }
  if(m.soldout){
    box.innerHTML='<div class="result-card"><div class="rh"><div class="re">⛔</div>'+
      '<div><div class="rn">'+m.name+' · 판매중지</div><div class="rsub">'+s.name+'에서 지금은 주문할 수 없어요</div></div></div>'+
      '<p style="color:var(--sub);font-size:13px;margin:0">다른 메뉴로 다시 말씀해 주세요.</p></div>';
    return;
  }
  var steps = [
    {ic:"🧠", t:"주문 의도 분석", v:s.name+" · "+m.name+(intent.temp?" · "+intent.temp:"")+(intent.size?" · "+intent.size:"")},
    {ic:"📲", t:s.name+" 화면 실행", v:"공개 URL "+HOST+"/order/"+s.name+"/"+m.name+" 진입"},
    {ic:"📍", t:"가장 가까운 매장 선택", v:s.area+" (자동 선택됨)"},
    {ic:m.emoji, t:"메뉴 자동 선택", v:m.name+" "+won(m.price)},
    {ic:"⚙️", t:"옵션 자동 설정", v:[intent.temp,intent.size].filter(Boolean).join(" · ")||"기본값 적용"},
    {ic:"🛒", t:"장바구니 담기", v:"수량 1개 추가 완료"},
    {ic:"✅", t:"결제 직전 도달", v:"최종 확인만 남았습니다"}
  ];
  box.innerHTML='<div class="steps" id="stepWrap">'+steps.map(function(st,i){
    return '<div class="step" data-i="'+i+'"><div class="marker"><div class="bullet">'+st.ic+'</div><div class="line"></div></div>'+
      '<div class="body"><div class="st">'+st.t+'</div><div class="sv">'+st.v+'</div></div></div>';
  }).join("")+'</div><div id="aiFinal"></div>';

  var nodes = box.querySelectorAll(".step");
  var i=0;
  (function next(){
    if(i>=nodes.length){
      var c=cartFood();
      c.push({kind:"food", store:s.name, slug:s.slug, name:m.name, price:m.price, qty:1, temp:intent.temp, size:intent.size});
      saveCartFood(c);
      $("#aiFinal").innerHTML =
        '<div class="result-card"><div class="rh"><div class="re">'+m.emoji+'</div>'+
        '<div><div class="rn">'+m.name+' 준비 완료</div><div class="rsub">'+s.name+' · '+s.area+
        ([intent.temp,intent.size].filter(Boolean).length?' · '+[intent.temp,intent.size].filter(Boolean).join(" · "):'')+'</div></div>'+
        '<div style="margin-left:auto;font-weight:900;color:var(--order);font-size:17px">'+won(m.price)+'</div></div>'+
        '<button class="cta" data-action="open-checkout" data-kind="food">결제 직전 화면 열기 ›</button></div>';
      $("#aiFinal").scrollIntoView({behavior:"smooth",block:"center"});
      return;
    }
    if(i>0){ nodes[i-1].classList.remove("act"); nodes[i-1].classList.add("done"); }
    nodes[i].classList.add("act");
    i++;
    setTimeout(next, 620);
  })();
}

function runAI(text){
  var box=$("#aiResult");
  text=(text||"").trim();
  if(!text){ toast("주문 내용을 입력하세요"); return; }
  window._lastAItext=text;

  // shopping: rank candidates (tag-aware). Show chooser when several are close.
  var cands=shopCandidates(text);
  if(cands.length>=2 && (cands[0].score - cands[1].score)<=3){
    return renderCandidates(text, cands);
  }
  if(cands.length>=1){
    var c0=cands[0];
    return playShopSteps(c0.shop, c0.product, shopIntentFor(c0.product, text));
  }

  // food: local match
  var food=parseIntent(text);
  if(food && food.menu){ return playOrderSteps(food.store, food.menu, food); }

  // nothing matched locally
  if(!getKey()){ return aiFail(box, "음식·상품을 찾지 못했어요"); }

  // real AI intent resolution (handles fuzzy phrasing / unseen items)
  box.innerHTML = aiLoading("AI가 요청을 분석 중…");
  var foodCat = stores().map(function(s){
    return { slug:s.slug, name:s.name, menus:s.menus.map(function(m){
      return { id:m.id, name:m.name, price:m.price, sizes:m.sizes||[], temps:m.temps||[] };
    })};
  });
  var shopCat = shops().map(function(sh){
    return { slug:sh.slug, name:sh.name, products:sh.products.map(function(p){
      return { id:p.id, name:p.name, tags:p.tags||[], options:p.options||{}, sellers:p.sellers.map(function(x){return x.name;}) };
    })};
  });
  var sys = "너는 한국어 주문/쇼핑 의도 분석기다. 사용자 요청이 음식 주문인지 쇼핑인지 판단하고, 카탈로그에서 항목 하나를 고른다. "+
    "JSON 하나만 출력(설명 금지): {\"type\":\"food\"|\"shop\",\"slug\":\"\",\"itemId\":\"\",\"itemName\":\"\",\"temp\":null,\"size\":null,\"options\":{},\"qty\":1}. "+
    "food면 slug=가게, itemId=메뉴id, temp/size는 해당 메뉴 옵션 중에서. "+
    "shop이면 slug=쇼핑몰, itemId=상품id, options는 상품 options의 각 키에 대해 사용자가 말한 값(없으면 생략). "+
    "각 상품의 tags는 검색 별칭이다 — 사용자가 tags에 있는 단어로 말하면 그 상품으로 매칭하라. "+
    "카탈로그에 없으면 slug를 \"\"로.";
  var usr = "[음식 카탈로그]\n"+JSON.stringify(foodCat)+"\n\n[쇼핑 카탈로그]\n"+JSON.stringify(shopCat)+"\n\n사용자 요청: \""+text+"\"";

  aiComplete({system:sys, blocks:[{type:"text", text:usr}], max_tokens:500, temperature:0, json:true, prefill:"{"})
    .then(function(txt){
      var j=parseJSONLoose(txt)||{};
      if(j.type==="shop"){
        var sh=j.slug?findShop(j.slug):null;
        var p=null;
        if(sh&&j.itemId){ for(var k=0;k<sh.products.length;k++){ if(sh.products[k].id===j.itemId) p=sh.products[k]; } }
        if(sh&&!p&&j.itemName) p=findProduct(sh, j.itemName);
        if(!sh||!p){ return aiFail(box, "AI가 상품을 특정하지 못했어요"); }
        return playShopSteps(sh, p, {opts:j.options||{}, qty:j.qty||1, seller:cheapest(p)});
      }
      // default: food
      var s=j.slug?findStore(j.slug):null;
      var m=null;
      if(s&&j.itemId){ for(var i=0;i<s.menus.length;i++){ if(s.menus[i].id===j.itemId) m=s.menus[i]; } }
      if(s&&!m&&j.itemName) m=findMenu(s, j.itemName);
      if(!s||!m){ return aiFail(box, "AI가 항목을 특정하지 못했어요"); }
      playOrderSteps(s, m, {store:s, menu:m, temp:(j.temp||m.defTemp||null), size:(j.size||m.defSize||(m.sizes?m.sizes[0]:null))});
    })
    .catch(function(err){
      var shopL2=parseShopIntent(text);
      if(shopL2){ toast("AI 호출 실패 — 로컬 분석으로 진행"); return playShopSteps(shopL2.shop, shopL2.product, shopL2); }
      var local=parseIntent(text);
      if(local&&local.menu){ toast("AI 호출 실패 — 로컬 분석으로 진행"); return playOrderSteps(local.store, local.menu, local); }
      aiFail(box, "AI 호출 실패: "+err.message);
    });
}

/* normalize, dedup and filter draft rows from Vision */
function cleanDraft(arr){
  var seen={}, out=[];
  arr.forEach(function(d){
    if(!d) return;
    var name=(""+(d.name||"")).trim();
    if(!name) return;
    if(/전화|영업|주소|배달|문의|instagram|insta|@|카카오/i.test(name)) return; // non-menu noise
    var key=name.replace(/\s/g,"");
    if(seen[key]) return; seen[key]=1;
    out.push({ name:name, cat:(""+(d.cat||"")).trim(), price:normPrice(d.price), desc:(""+(d.desc||"")).trim() });
  });
  return out.slice(0,40);
}

function tkAutoReply(text){

  if(/배달|주문|가능|되나|되요|될까/.test(t)) return "네, 주문 가능합니다! 포도다 주문 링크로 바로 담아드릴게요 🛒";
  if(/얼마|가격|비용/.test(t)) return "메뉴/상품마다 달라요. 원하시는 걸 말씀해 주시면 안내드릴게요!";
  if(/감사|고마|ㄳ|thank/.test(t)) return "감사합니다! 또 찾아주세요 🍇";
  if(/안녕|하이|hi|헬로|반가/.test(t)) return "안녕하세요, 반갑습니다! 무엇을 도와드릴까요?";
  var pool=["네, 확인했습니다! 😊","말씀 감사합니다 🙌","좋아요! 필요하신 거 있으면 언제든 말씀해 주세요.","오 저도 궁금했어요 ㅎㅎ","네네 알겠습니다 👍","공감이요 👏"];
  return pool[Math.floor(Math.random()*pool.length)];
}

function tkFsize(n){ n=n||0; if(n<1024) return n+"B"; if(n<1048576) return (n/1024).toFixed(0)+"KB"; return (n/1048576).toFixed(1)+"MB"; }
function tkBubbleInner(m){
  if(m.type==="image" && m.img){ return '<div class="tk-bub img"><img class="tk-mimg" src="'+m.img+'"></div>'; }
  if(m.type==="album" && m.imgs && m.imgs.length){
    var g=m.imgs.slice(0,9).map(function(u){ return '<span class="tk-galc" style="background-image:url(\''+u+'\')"></span>'; }).join("");
    var n=Math.min(m.imgs.length,4); if(m.imgs.length===1) n=1;
    return '<div class="tk-bub album g'+n+'">'+g+'</div>';
  }
  if(m.type==="file"){ return '<div class="tk-bub file"><span class="tk-fic">📎</span><span class="tk-fmeta"><b>'+escapeHtml(m.fname||"파일")+'</b><small>'+tkFsize(m.fsize)+'</small></span></div>'; }
  var rq = m.replyTo ? '<div class="tk-quote"><b>'+escapeHtml(m.replyTo.name||"")+'</b> '+escapeHtml((m.replyTo.text||"").length>40?m.replyTo.text.slice(0,40)+"…":(m.replyTo.text||""))+'</div>' : '';

/* ---- 방 이름 매칭(비슷한 말 포함) + 바로 이동 ---- */
function _tkNorm(s){ return String(s||"").toLowerCase().replace(/[\s\.\,\!\?~·\-_'"()\[\]#방]/g,""); }
function _tkBigrams(s){ s=_tkNorm(s); var o={}; if(s.length<2){ if(s) o[s]=1; return o; } for(var i=0;i<s.length-1;i++){ o[s.substr(i,2)]=1; } return o; }
function _tkDice(a,b){ var A=_tkBigrams(a), B=_tkBigrams(b), ka=Object.keys(A), kb=Object.keys(B); if(!ka.length||!kb.length) return 0; var inter=0; for(var i=0;i<ka.length;i++){ if(B[ka[i]]) inter++; } return (2*inter)/(ka.length+kb.length); }
function matchTalkRoom(query){
  var q=_tkNorm(query); if(!q) return null;
  var rooms=talkRooms(); var best=null, bestScore=0;
  rooms.forEach(function(r){
    var nm=_tkNorm(r.name); if(!nm) return;
    var score=_tkDice(query, r.name);
    if(nm.indexOf(q)>=0 || q.indexOf(nm)>=0){ score=Math.max(score, 0.9); }
    if(score>bestScore){ bestScore=score; best=r; }
  });
  return (best && bestScore>=0.34) ? best : null;
}
function runTalkSay(){
  var el=$("#tkSay"); if(!el) return;
  var q=(el.value||"").trim(); if(!q){ toast("이동할 방 이름을 말하거나 입력해주세요"); return; }
  var r=matchTalkRoom(q);
  if(r){ location.hash="#/talk/room/"+r.id; }
  else { toast("‘"+q+"’ 방을 찾지 못했어요"); }
}
function talkSayVoice(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast("이 브라우저는 음성인식을 지원하지 않아요"); return; }
  var rec=new SR(); rec.lang="ko-KR"; rec.interimResults=false;
  var btn=$("#tkSayMic"); if(btn) btn.classList.add("rec");
  rec.onresult=function(ev){ var t=ev.results[0][0].transcript; var el=$("#tkSay"); if(el) el.value=t; runTalkSay(); };
  rec.onerror=function(){ toast("음성 인식 실패"); };
  rec.onend=function(){ var b=$("#tkSayMic"); if(b) b.classList.remove("rec"); };
  try{ rec.start(); }catch(e){}
}

  });

function tkResizeImg(file, max, cb){
  var r=new FileReader();
  r.onload=function(){
    var img=new Image();
    img.onload=function(){
      var s=Math.min(max/img.width, max/img.height, 1); var w=Math.round(img.width*s), h=Math.round(img.height*s);
      var c=document.createElement("canvas"); c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h);
      try{ cb(c.toDataURL("image/jpeg",0.82)); }catch(e){ toast("이미지 처리에 실패했어요"); }
    };
    img.onerror=function(){ toast("이미지를 불러오지 못했어요"); };
    img.src=r.result;
  };
  r.readAsDataURL(file);
}

/* 쇼핑 상품 → 판매자와 1:1 채팅 (포도톡 일반채팅으로 이동) */
function openSellerChat(shopSlug, prodId){
  var sh=findShop(shopSlug);
  if(!sh){ toast("판매자를 찾을 수 없어요"); return; }
  var p=findProduct(sh, prodId);
  seedTalk();
  var id="dm_shop_"+sh.slug;
  var rooms=talkRooms();
  var existing=findRoom(id);
  if(!existing){
    rooms.push({ id:id, type:"dm", name:sh.name+" 판매자", emoji:sh.emoji||"🛍️", sub:"상품 문의 · 판매자 채팅", noti:true, ts:Date.now() });
    saveTalkRooms(rooms);
    var intro = p ? ("안녕하세요! 『"+p.name+"』 문의 주셨네요 😊 궁금한 점 편하게 물어보세요.")
                  : ("안녕하세요! "+sh.name+" 판매자입니다 😊 무엇을 도와드릴까요?");
    saveTalkMsgs(id, [{ who:"them", name:sh.name+" 판매자", avatar:sh.emoji||"🛍️", text:intro, ts:Date.now() }]);
  } else if(p){
    var m=talkMsgs(id); var last=m.length?m[m.length-1]:null;
    if(!last || (last.text||"").indexOf(p.name)<0){
      m.push({ who:"them", name:sh.name+" 판매자", avatar:sh.emoji||"🛍️", text:"『"+p.name+"』 관련해서 도와드릴게요! 궁금한 점 말씀해 주세요 😊", ts:Date.now() });
      saveTalkMsgs(id, m);
    }
  }
  location.hash="#/talk/room/"+id;
}
